# Code Quality Workflow for oh-my-opencode
# 注册全量代码质量检查工作流

name: code-quality-check
description: 全量代码质量检查 - 执行 OpenSpec 规范检查和 npm 脚本

# 自然语言触发模式
triggers:
  - pattern: "全量检查"
    description: 执行完整的代码质量检查（OpenSpec + quality:check）
  - pattern: "代码质量检查"
    description: 执行代码质量检查流程
  - pattern: "质量检查"
    description: 执行质量检查
  - pattern: "检查代码质量"
    description: 检查代码质量

# 工作流定义
workflow:
  type: sequential  # 顺序执行
  steps:
    # 步骤 1: 执行 spec:check (OpenSpec 规范检查)
    - name: openspec-validate
      description: 验证 OpenSpec 接口规范
      command: cd backend && npx openspec validate --all --json
      timeout: 60000  # 60秒超时
      onFailure: continue  # 失败时继续执行其他步骤

    # 步骤 2: 执行 quality:check (ESLint + Prettier)
    - name: quality-check
      description: 执行代码质量检查
      command: cd backend && npm run quality:check
      timeout: 120000  # 120秒超时
      onFailure: continue  # 失败时继续执行其他步骤

# 输出配置
output:
  format: summary
  showErrors: true
  showWarnings: true
