# 自动初始化配置
auto_start:
  agents: true              # 自动加载智能体
  skills: true              # 自动加载技能
  algorithms: true          # 自动启用算法组件
  cache: true               # 自动启用缓存系统
  rate_limiting: true       # 自动启用限流熔断
  ml_integration: true      # 自动启用机器学习集成
  monitoring: true          # 自动启用监控系统
  sync_tool: true           # 自动启动配置同步

settings:
  log_level: INFO
  auto_reload: true
  reload_interval: 30       # 秒
