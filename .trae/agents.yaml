scan_config:
  directories:
    - path: ".trae/agents"
      pattern: "*_agent.md"
      recursive: true
  exclude_patterns:
    - "__pycache__"
    - "*.pyc"
    - "node_modules"
    - ".git"
    - "新建文件夹"
  auto_reload: true
  reload_interval: 30