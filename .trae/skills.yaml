# Skills配置文件

skills:
  - skill_id: auto-debug
    name: 智能排错
    description: 自动化调试，从报错到修复一站式
    trigger_keywords:
      - 调试
      - 报错
      - bug
      - 错误
      - 修复
    category: debugging

  - skill_id: auto-hook
    name: 自动化钩子
    description: 事件驱动的自动化触发器
    trigger_keywords:
      - hook
      - 钩子
      - 自动化
      - 触发
    category: automation

  - skill_id: auto-doc
    name: 一键生成文档
    description: 自动生成README、API文档、代码注释
    trigger_keywords:
      - 文档
      - README
      - 注释
      - 生成文档
    category: documentation

  - skill_id: auto-refactor
    name: 全局代码重构
    description: 批量安全重构整个项目
    trigger_keywords:
      - 重构
      - refactor
      - 批量修改
      - 迁移
    category: refactoring

  - skill_id: local-privacy
    name: 本地隐私联动
    description: 本地资源安全读取，不上传云端
    trigger_keywords:
      - 本地
      - 隐私
      - local
      - 笔记
    category: privacy
