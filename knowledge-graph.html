                { source: '6a-automate', target: '6a-assess', relation: '执行完成后评估' },
                
                { source: '6a-atomize', target: 'task-core', relation: '6A调用任务拆分' },
                { source: '6a-automate', target: 'coding-core', relation: '6A调用编码规范' },
                { source: '6a-automate', target: 'test-core', relation: '6A调用测试指南' },
                { source: '6a-assess', target: 'quality-core', relation: '6A调用质量门禁' },
                { source: '6a-automate', target: 'git-core', relation: '6A调用Git工作流' },
                
                { source: 'quality-core', target: 'coding-core', relation: '质量检查编码规范' },
                { source: 'quality-core', target: 'test-core', relation: '质量验证测试覆盖' },
                { source: 'quality-core', target: 'security-core', relation: '质量包含安全检查' },
                { source: 'quality-check', target: 'abtest-core', relation: '质量数据支撑AB测试' },
                
                { source: 'security-core', target: 'coding-core', relation: '安全检查代码规范' },
                { source: 'security-core', target: 'git-core', relation: '安全检查Git提交' },
                { source: 'security-risk', target: '6a-approve', relation: '风险操作需6A审批' },
                
                { source: 'test-core', target: 'coding-core', relation: '测试验证代码质量' },
                { source: 'test-core', target: 'git-core', relation: '测试通过后提交' },
                { source: 'test-safety', target: 'task-core', relation: '测试为任务拆分提供保障' },
                
                { source: 'task-core', target: 'quality-core', relation: '任务质量影响整体质量' },
                { source: 'task-core', target: 'test-core', relation: '原子任务需可测试' },
                { source: 'task-core', target: 'identity-core', relation: '根据身份类型拆分任务' },
                
                { source: 'coding-core', target: 'git-core', relation: '编码规范纳入Git审查' },
                { source: 'coding-smell', target: 'quality-guide', relation: '代码异味影响质量评分' },
                
                { source: 'identity-core', target: '6a-core', relation: '身份参与6A各阶段' },
                { source: 'identity-core', target: 'source-core', relation: '身份影响信源选择' },

                { source: 'abtest-result', target: 'rule-engine', relation: '测试结果优化规则引擎' },
                
                { source: 'source-core', target: 'rule-engine', relation: '信源评估支撑规则解析' },
                { source: 'source-core', target: '6a-core', relation: '信源选择影响调研策略' },
                { source: 'source-user', target: 'source-rule', relation: '用户输入优先级最高' },
                { source: 'source-rule', target: 'source-scan', relation: '规则文件优于结构扫描' },
                { source: 'source-scan', target: 'rule-engine', relation: '项目结构支撑技术选型' },
                
                { source: 'dialogue-core', target: 'rule-engine', relation: '对话摘要支撑上下文管理' },
                { source: 'dialogue-core', target: '6a-core', relation: '摘要保留6A关键决策' },
                { source: 'dialogue-decision', target: 'task-core', relation: '决策记录影响任务拆分' },
                { source: 'dialogue-state', target: 'quality-core', relation: '状态记录支撑质量评估' },
                
                { source: 'suggest-core', target: 'rule-engine', relation: '规则建议优化引擎决策' },
                { source: 'suggest-core', target: 'quality-core', relation: '建议提升质量规则' },
                { source: 'suggest-core', target: 'abtest-core', relation: '建议来源AB测试数据' },
                { source: 'suggest-trigger', target: 'suggest-draft', relation: '触发场景生成草案' },
                { source: 'suggest-draft', target: 'suggest-approve', relation: '草案提交审批' },
                { source: 'suggest-approve', target: 'rule-engine', relation: '审批后更新规则引擎' },
                
                { source: 'algo-core', target: 'token-core', relation: '算法优化支撑Token节省' },
                { source: 'algo-cache', target: 'token-cache', relation: '缓存算法复用Prompt' },
                { source: 'algo-vector', target: 'source-core', relation: '向量匹配增强信源评估' },
                { source: 'algo-game', target: '6a-architect', relation: '博弈决策辅助方案对比' },
                { source: 'algo-core', target: 'quality-core', relation: '算法优化提升质量评分' },
                
                { source: 'token-core', target: 'dialogue-core', relation: 'Token优化与摘要压缩协同' },
                { source: 'token-cache', target: 'algo-cache', relation: '共享缓存策略' },
                { source: 'token-core', target: 'quality-core', relation: '成本优化不影响质量' },
                { source: 'token-batch', target: 'task-core', relation: '批量处理优化任务执行' }
            ]
        };
        
        const svg = d3.select('#graph');
        let graphWidth = window.innerWidth;
        let graphHeight = window.innerHeight;
        
        const zoom = d3.zoom()
            .scaleExtent([0.3, 3])
            .on('zoom', (event) => {
                container.attr('transform', event.transform);
            });
        svg.call(zoom);
        
        const container = svg.append('g');
        
        const simulation = d3.forceSimulation(graphData.nodes)
            .force('link', d3.forceLink(graphData.links).id(d => d.id).distance(100))
            .force('charge', d3.forceManyBody().strength(-600))
            .force('center', d3.forceCenter(graphWidth / 2, graphHeight / 2))
            .force('collision', d3.forceCollide().radius(50));
        
        function getNodeColor(d) {
            if (d.type === 'engine') return '#f9ca24';
            const colors = {
                '6a': '#e74c3c',
                'quality': '#27ae60',
                'security': '#9b59b6',
                'test': '#3498db',
                'identity': '#e67e22',
                'git': '#1abc9c',
                'task': '#f39c12',
                'coding': '#95a5a6',
                'abtest': '#2ecc71',
                'source': '#e91e63',
                'dialogue': '#00bcd4',
                'suggest': '#ff5722',
                'algo': '#7c4dff',
                'token': '#00e676'
            };
            return colors[d.module] || '#9e9e9e';
        }
        
        function getNodeRadius(d) {
            if (d.type === 'engine') return 45;
            if (d.type === 'module') return 32;
            return 18;
        }
        
        const link = container.append('g')
            .selectAll('line')
            .data(graphData.links)
            .enter().append('line')
            .attr('stroke', 'rgba(255,255,255,0.2)')
            .attr('stroke-width', 1.5)
            .attr('stroke-dasharray', d => d.relation ? '5,5' : '0');
        
        const node = container.append('g')
            .selectAll('g')
            .data(graphData.nodes)
            .enter().append('g')
            .attr('class', 'node')
            .call(d3.drag()
                .on('start', dragStarted)
                .on('drag', dragged)
                .on('end', dragEnded));
        
        node.append('circle')
            .attr('r', getNodeRadius)
            .attr('fill', getNodeColor)
            .attr('stroke', '#fff')
            .attr('stroke-width', 2)
            .style('filter', d => d.type === 'engine' ? 'drop-shadow(0 0 20px rgba(249,202,36,0.7))' : 'drop-shadow(0 2px 6px rgba(0,0,0,0.4))');
        
        node.append('text')
            .text(d => d.name)
            .attr('text-anchor', 'middle')
            .attr('dy', d => getNodeRadius(d) + 14)
            .attr('fill', '#fff')
            .attr('font-size', d => d.type === 'engine' ? '12px' : '10px')
            .style('pointer-events', 'none');
        
        simulation.on('tick', () => {
            link.attr('x1', d => d.source.x)
                .attr('y1', d => d.source.y)
                .attr('x2', d => d.target.x)
                .attr('y2', d => d.target.y);
            node.attr('transform', d => `translate(${d.x},${d.y})`);
        });
        
        function dragStarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
        }
        function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
        }
        function dragEnded(event, d) {
            if (!event.active) simulation.alphaTarget(0);
        }
        
        const tooltip = d3.select('#tooltip');
        node.on('mouseover', function(event, d) {
            tooltip.style('display', 'block')
                .html(`<div class="tooltip-title">${d.name}</div>
                       <div class="tooltip-info">${d.description.replace(/\n/g, '<br>')}</div>` +
                       (d.relation ? `<div class="tooltip-relation">→ ${d.relation}</div>` : ''));
        })
        .on('mousemove', function(event) {
            tooltip.style('left', (event.pageX + 15) + 'px')
                   .style('top', (event.pageY - 10) + 'px');
        })
        .on('mouseout', function() {
            tooltip.style('display', 'none');
        });
        
        document.getElementById('nodeCount').textContent = graphData.nodes.length;
        document.getElementById('linkCount').textContent = graphData.links.length;
        
        function showModule(type) {
            document.querySelectorAll('.control-panel button').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + type).classList.add('active');
            
            if (type === 'all') {
                node.style('opacity', 1);
                link.style('opacity', 1).attr('stroke', 'rgba(255,255,255,0.2)');
                return;
            }
            
            if (type === 'engine') {
                node.style('opacity', d => d.type === 'engine' || d.type === 'module' ? 1 : 0.15);
                link.style('opacity', d => d.source.type === 'engine' || d.target.type === 'engine' ? 1 : 0.1);
                return;
            }
            
            if (type === 'relation') {
                node.style('opacity', d => d.type === 'module' ? 1 : 0.2);
                link.style('opacity', 0.6).attr('stroke', d => {
                    const colors = {
                        '6a': '#e74c3c', 'quality': '#27ae60', 'security': '#9b59b6',
                        'test': '#3498db', 'identity': '#e67e22', 'git': '#1abc9c',
                        'task': '#f39c12', 'coding': '#95a5a6', 'abtest': '#2ecc71',
                        'source': '#e91e63', 'dialogue': '#00bcd4', 'suggest': '#ff5722'
                    };
                    return colors[d.source.module] || 'rgba(255,255,255,0.3)';
                });
                return;
            }
            
            const moduleColors = {
                '6a': '#e74c3c', 'quality': '#27ae60', 'security': '#9b59b6',
                'test': '#3498db', 'identity': '#e67e22', 'git': '#1abc9c',
                'task': '#f39c12', 'coding': '#95a5a6', 'abtest': '#2ecc71',
                'source': '#e91e63', 'dialogue': '#00bcd4', 'suggest': '#ff5722',
                'algo': '#7c4dff', 'token': '#00e676'
            };
            
            node.style('opacity', d => {
                if (d.module === type) return 1;
                if (d.type === 'engine') return 0.8;
                if (d.parent) {
                    const parent = graphData.nodes.find(n => n.id === d.parent);
                    return parent && parent.module === type ? 1 : 0.15;
                }
                return 0.15;
            });
            
            link.style('opacity', d => {
                if (d.source.module === type || d.target.module === type) return 1;
                return 0.1;
            }).attr('stroke', d => {
                if (d.source.module === type || d.target.module === type) {
                    return moduleColors[type] || '#f9ca24';
                }
                return 'rgba(255,255,255,0.1)';
            });
        }
        
        setTimeout(() => showModule('engine'), 1000);
        
        window.addEventListener('resize', () => {
            graphWidth = window.innerWidth;
            graphHeight = window.innerHeight;
            simulation.force('center', d3.forceCenter(graphWidth / 2, graphHeight / 2));
            simulation.alpha(0.3).restart();
        });
    </script>
