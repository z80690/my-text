<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>规则体系知识图谱</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            overflow: hidden;
        }
        #header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(26, 26, 46, 0.95);
            padding: 15px 30px;
            z-index: 1000;
            border-bottom: 2px solid #0f3460;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        #header h1 {
            color: #e94560;
            font-size: 24px;
            margin-bottom: 5px;
        }
        #header p {
            color: #aaa;
            font-size: 14px;
        }
        #graph {
            width: 100vw;
            height: 100vh;
        }
        .node circle {
            stroke-width: 3px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .node circle:hover {
            filter: brightness(1.3);
        }
        .node text {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            font-size: 12px;
            fill: #fff;
            text-anchor: middle;
            pointer-events: none;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }
        .link {
            stroke: #533483;
            stroke-width: 2px;
            opacity: 0.6;
            transition: all 0.3s ease;
        }
        .link:hover {
            stroke: #e94560;
            opacity: 1;
            stroke-width: 3px;
        }
        #legend {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(26, 26, 46, 0.9);
            padding: 15px 20px;
            border-radius: 10px;
            border: 1px solid #0f3460;
        }
        #legend h3 {
            color: #e94560;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin: 5px 0;
            color: #ddd;
            font-size: 12px;
        }
        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            margin-right: 10px;
            border: 2px solid;
        }
        #info {
            position: fixed;
            top: 100px;
            right: 20px;
            width: 300px;
            background: rgba(26, 26, 46, 0.95);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #0f3460;
            display: none;
        }
        #info h3 {
            color: #e94560;
            margin-bottom: 10px;
        }
        #info p {
            color: #ddd;
            font-size: 13px;
            line-height: 1.6;
        }
        #info .close {
            position: absolute;
            top: 10px;
            right: 15px;
            color: #888;
            cursor: pointer;
            font-size: 20px;
        }
        #info .close:hover {
            color: #e94560;
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>🎯 规则体系知识图谱 v5.0</h1>
        <p>滔定律（τ定律）- 高效做事、科学决策原则</p>
    </div>

    <div id="graph"></div>

    <div id="legend">
        <h3>📊 图例</h3>
        <div class="legend-item">
            <div class="legend-color" style="background: #e94560; border-color: #ff6b8a;"></div>
            <span>L1 - 顶层原则</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #533483; border-color: #7c4dff;"></div>
            <span>L2 - 行为规范</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #0f3460; border-color: #1e5f9f;"></div>
            <span>L3 - 操作指南</span>
        </div>
    </div>

    <div id="info">
        <span class="close" onclick="document.getElementById('info').style.display='none'">×</span>
        <h3 id="info-title"></h3>
        <p id="info-desc"></p>
    </div>

    <script>
        const data = {
            nodes: [
                { id: "tao", name: "滔定律（τ定律）", desc: "高效做事、科学决策原则：不堆资源、不搞复杂并行，把复杂事拆成一步一步串行做，一步一检查、聚焦当下、不跳步、不贪多", level: "L1", group: 1 },
                { id: "quality", name: "质量核心", desc: "质量是生命线，不可妥协", level: "L1", group: 1 },
                { id: "safety", name: "安全铁律", desc: "安全 > 功能 > 性能", level: "L1", group: 1 },
                { id: "6a", name: "6A流程", desc: "Align→Architect→Atomize→Approve→Automate→Assess", level: "L1", group: 1 },
                { id: "collaboration", name: "三Agent协作", desc: "调度Agent、开发Agent、监督Agent", level: "L1", group: 1 },
                
                { id: "recursive-l2", name: "递归执行规范", desc: "串行执行、递归拆分、阶段验证、禁止跳步", level: "L2", group: 2 },
                { id: "safety-l2", name: "安全执行规范", desc: "数据安全、系统安全、代码安全", level: "L2", group: 2 },
                { id: "quality-l2", name: "质量规范", desc: "功能完整、测试通过、代码规范", level: "L2", group: 2 },
                { id: "6a-l2", name: "6A流程规范", desc: "各阶段详细执行标准", level: "L2", group: 2 },
                { id: "dev-l2", name: "开发Agent规范", desc: "递归执行、自验证、质量保障", level: "L2", group: 2 },
                { id: "supervise-l2", name: "监督Agent规范", desc: "递归监督、代码审查、质量评估", level: "L2", group: 2 },
                { id: "schedule-l2", name: "调度Agent规范", desc: "任务拆分、路由分配、资源调度", level: "L2", group: 2 },
                { id: "efficiency-l2", name: "效率优化规范", desc: "API优化、工具选择、成本控制", level: "L2", group: 2 },
                { id: "incentive-l2", name: "正向激励规范", desc: "信任度、权限等级、激励机制", level: "L2", group: 2 },
                
                { id: "recursive-l3", name: "递归思考指南", desc: "详细的递归执行操作指导", level: "L3", group: 3 },
                { id: "6a-l3", name: "6A流程指南", desc: "详细的6A流程操作指导", level: "L3", group: 3 },
                { id: "quality-l3", name: "质量体系指南", desc: "详细的质量检查操作指导", level: "L3", group: 3 },
                { id: "task-l3", name: "任务拆解指南", desc: "详细的任务拆分操作指导", level: "L3", group: 3 },
                { id: "incentive-l3", name: "正向激励指南", desc: "详细的激励机制操作指导", level: "L3", group: 3 },
                { id: "algorithm-l3", name: "算法优化指南", desc: "详细的算法优化操作指导", level: "L3", group: 3 },
                { id: "abtest", name: "AB测试方案", desc: "验证递归规则效果的测试方案", level: "L3", group: 3 }
            ],
            links: [
                { source: "tao", target: "quality" },
                { source: "tao", target: "safety" },
                { source: "tao", target: "6a" },
                { source: "tao", target: "collaboration" },
                
                { source: "tao", target: "recursive-l2" },
                { source: "safety", target: "safety-l2" },
                { source: "quality", target: "quality-l2" },
                { source: "6a", target: "6a-l2" },
                { source: "collaboration", target: "dev-l2" },
                { source: "collaboration", target: "supervise-l2" },
                { source: "collaboration", target: "schedule-l2" },
                
                { source: "recursive-l2", target: "efficiency-l2" },
                { source: "recursive-l2", target: "incentive-l2" },
                
                { source: "recursive-l2", target: "recursive-l3" },
                { source: "6a-l2", target: "6a-l3" },
                { source: "quality-l2", target: "quality-l3" },
                { source: "schedule-l2", target: "task-l3" },
                { source: "incentive-l2", target: "incentive-l3" },
                { source: "efficiency-l2", target: "algorithm-l3" },
                
                { source: "recursive-l3", target: "abtest" }
            ]
        };

        const width = window.innerWidth;
        const height = window.innerHeight;

        const svg = d3.select("#graph").append("svg")
            .attr("width", width)
            .attr("height", height);

        const colorScale = {
            1: { fill: "#e94560", stroke: "#ff6b8a" },
            2: { fill: "#533483", stroke: "#7c4dff" },
            3: { fill: "#0f3460", stroke: "#1e5f9f" }
        };

        const sizeScale = {
            "L1": 40,
            "L2": 30,
            "L3": 22
        };

        const simulation = d3.forceSimulation(data.nodes)
            .force("link", d3.forceLink(data.links).id(d => d.id).distance(120))
            .force("charge", d3.forceManyBody().strength(-800))
            .force("center", d3.forceCenter(width / 2, height / 2))
            .force("collision", d3.forceCollide().radius(d => sizeScale[d.level] + 10));

        const link = svg.append("g")
            .selectAll("line")
            .data(data.links)
            .enter().append("line")
            .attr("class", "link");

        const node = svg.append("g")
            .selectAll("g")
            .data(data.nodes)
            .enter().append("g")
            .attr("class", "node")
            .call(d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended));

        node.append("circle")
            .attr("r", d => sizeScale[d.level])
            .attr("fill", d => colorScale[d.group].fill)
            .attr("stroke", d => colorScale[d.group].stroke)
            .on("click", showInfo);

        node.append("text")
            .attr("dy", d => sizeScale[d.level] + 15)
            .text(d => d.name);

        simulation.on("tick", () => {
            link
                .attr("x1", d => d.source.x)
                .attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x)
                .attr("y2", d => d.target.y);

            node
                .attr("transform", d => `translate(${d.x},${d.y})`);
        });

        function dragstarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
        }

        function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
        }

        function dragended(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
        }

        function showInfo(event, d) {
            const info = document.getElementById("info");
            document.getElementById("info-title").textContent = `${d.level}: ${d.name}`;
            document.getElementById("info-desc").textContent = d.desc;
            info.style.display = "block";
        }

        window.addEventListener("resize", () => {
            const newWidth = window.innerWidth;
            const newHeight = window.innerHeight;
            svg.attr("width", newWidth).attr("height", newHeight);
            simulation.force("center", d3.forceCenter(newWidth / 2, newHeight / 2));
            simulation.alpha(0.3).restart();
        });
    </script>
</body>
</html>
