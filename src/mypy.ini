# mypy configuration file
# For Python 3.10+ projects

[mypy]
# Python version
python_version = 3.10

# Enable strict checks
warn_return_any = True
warn_unused_ignores = True
disallow_untyped_defs = True
check_untyped_defs = True
no_implicit_optional = True
strict_optional = True

# Additional strictness
strict_equality = True

# Follow imports
follow_imports = normal

# Show error codes
show_error_codes = True

# Color output
pretty = True

# Incremental mode
incremental = True

# Cache directory
cache_dir = .mypy_cache

# Exclude patterns
exclude = (?x)(
    \.git/
    | \.venv/
    | node_modules/
    | __pycache__/
    | \.mypy_cache/
    | build/
    | dist/
  )

[mypy-tests]
# Test file settings (less strict)
disallow_untyped_defs = False
check_untyped_defs = False
warn_unused_ignores = False

[mypy-*.pyi]
# Stub files
follow_imports = skip

[tool.mypy]
# PEP 561 compliant - mark package as providing type stubs
package_root_dirs = ["src"]
