[pylint.master]
# 禁用因缺少依赖导致的误报
disable=import-error,missing-module-docstring,missing-function-docstring,unused-variable

# 启用类型检查相关的消息
enable=typecheck,invalid-name,bad-string-char-type

[pylint.typecheck]
# 检测函数调用时的参数类型错误
signs-generate=yes

[pylint.messages_control]
# 禁用一些不重要的消息类别
disable=line-too-long,too-many-instance-attributes,too-many-arguments,too-many-public-methods

[pylint.basic]
# 命名约定配置
function-naming-style=snake_case
variable-naming-style=snake_case
const-naming-style=UPPER_CASE
